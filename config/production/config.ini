listen_ip=0.0.0.0
listen_port=10053
io_threads=0
prefer_native_transport=true
reuse_port=true
receive_buffer_bytes=16777216
send_buffer_bytes=16777216
max_udp_payload_bytes=4096

backend_dns=127.0.0.1:1053,127.0.0.1:1054,127.0.0.1:1055
backup_dns=192.168.1.1:53
backup_dns_file=
request_timeout_ms=1000
max_attempts=2
max_inflight=65535

check_domain=example.com
check_interval_ms=5000
health_failure_threshold=3

cache_backend=true
cache_backup=false
cache_max_weight_bytes=268435456
cache_max_ttl_seconds=1800
metrics_interval_seconds=30
