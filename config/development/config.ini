# Listener
listen_ip=0.0.0.0
listen_port=11353
io_threads=0
prefer_native_transport=true
reuse_port=true
receive_buffer_bytes=4194304
send_buffer_bytes=4194304
max_udp_payload_bytes=4096

# Upstreams
backend_dns=127.0.0.1:1053
backup_dns=192.168.1.1:53
backup_dns_file=
request_timeout_ms=1500
max_attempts=2
max_inflight=32768

# Health checks
check_domain=example.com
check_interval_ms=5000
health_failure_threshold=3

# Cache
cache_backend=true
cache_backup=false
cache_max_weight_bytes=67108864
cache_max_ttl_seconds=1800

# Aggregated metrics log interval; 0 disables reporting
metrics_interval_seconds=30
