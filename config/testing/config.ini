listen_ip=127.0.0.1
listen_port=10053
io_threads=1
prefer_native_transport=false
reuse_port=false
receive_buffer_bytes=1048576
send_buffer_bytes=1048576
max_udp_payload_bytes=4096

backend_dns=127.0.0.1:1053
backup_dns=
backup_dns_file=
request_timeout_ms=500
max_attempts=1
max_inflight=1024

check_domain=example.com
check_interval_ms=10000
health_failure_threshold=2

cache_backend=true
cache_backup=false
cache_max_weight_bytes=16777216
cache_max_ttl_seconds=300
metrics_interval_seconds=0
